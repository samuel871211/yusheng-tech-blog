<svg width="960" height="450" viewBox="0 0 960 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- title -->
  <text x="480" y="39" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#333">Writable：使用者生產、實作者消費</text>

  <!-- role: user -->
  <rect x="30" y="195" width="135" height="90" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="3" />
  <text x="97.5" y="232.5" text-anchor="middle" font-family="Arial" font-size="19.5" font-weight="bold" fill="#1e40af">使用者</text>
  <text x="97.5" y="258" text-anchor="middle" font-family="Arial" font-size="16.5" fill="#1e40af">(producer)</text>

  <!-- internal buffer -->
  <rect x="390" y="120" width="180" height="300" rx="6" fill="none" stroke="#333" stroke-width="3" />
  <text x="390" y="105" font-family="Arial" font-size="24" font-weight="bold" fill="#333">internal buffer</text>

  <line x1="375" x2="585" y1="180" y2="180" stroke="#e74c3c" stroke-width="3" stroke-dasharray="7.5,7.5"/>
  <text x="592.5" y="187.5" font-family="monospace" font-size="19.5" fill="#e74c3c">highWaterMark</text>

  <rect x="405" y="360" width="150" height="45" rx="3" fill="#3498db" opacity="0.8" stroke="#2980b9" />
  <text x="450" y="390" font-family="Arial" font-size="18" fill="white">chunk</text>

  <rect x="405" y="307.5" width="150" height="45" rx="3" fill="#3498db" opacity="0.8" stroke="#2980b9" />
  <text x="450" y="337.5" font-family="Arial" font-size="18" fill="white">chunk</text>

  <rect x="405" y="255" width="150" height="45" rx="3" fill="#3498db" opacity="0.4" stroke="#2980b9" />
  <text x="450" y="285" font-family="Arial" font-size="18" fill="#2980b9">chunk</text>

  <!-- role: implementer -->
  <rect x="795" y="195" width="135" height="90" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="3" />
  <text x="862.5" y="232.5" text-anchor="middle" font-family="Arial" font-size="19.5" font-weight="bold" fill="#92400e">實作者</text>
  <text x="862.5" y="258" text-anchor="middle" font-family="Arial" font-size="16.5" fill="#92400e">(consumer)</text>

  <!-- arrows -->
  <path d="M 172.5 240 L 352.5 240" fill="none" stroke="#2c3e50" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="183" y="225" font-family="monospace" font-size="19.5" fill="#2c3e50" font-style="italic">.write(chunk)</text>

  <path d="M 577.5 240 L 757.5 240" fill="none" stroke="#2c3e50" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="603" y="225" font-family="monospace" font-size="19.5" fill="#2c3e50" font-style="italic">._write(chunk)</text>
</svg>
