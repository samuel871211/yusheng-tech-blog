<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" height="400" font-family="Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 20px; font-weight: bold; fill: #111827; text-anchor: middle; }
    .box-lookup { fill: #F3F4F6; stroke: #6B7280; stroke-width: 1.5; stroke-dasharray: 5,4; }
    .box-attempt { fill: #DBEAFE; stroke: #2563EB; stroke-width: 1.5; }
    .box-connect { fill: #DCFCE7; stroke: #16A34A; stroke-width: 1.5; }
    .box-error { fill: #FEE2E2; stroke: #DC2626; stroke-width: 1.5; }
    .box-retry { fill: #FEF3C7; stroke: #D97706; stroke-width: 1.5; }
    .label { font-size: 15px; fill: #1F2937; text-anchor: middle; dominant-baseline: middle; }
    .edge { fill: none; stroke: #4B5563; stroke-width: 1.5; marker-end: url(#arrow); }
    .end-success { fill: #DCFCE7; stroke: #16A34A; stroke-width: 1.5; }
    .end-error { fill: #FEE2E2; stroke: #DC2626; stroke-width: 1.5; }
  </style>

  <!-- title -->
  <text class="title" x="320" y="35">TCP client socket 連線嘗試（connectionAttempt）狀態機</text>

  <!-- lookup -->
  <rect class="box-lookup" x="20" y="210" width="110" height="50" rx="8"/>
  <text class="label" x="75" y="235">lookup</text>

  <!-- connectionAttempt -->
  <rect class="box-attempt" x="185" y="210" width="180" height="50" rx="8"/>
  <text class="label" x="275" y="235">connectionAttempt</text>

  <!-- connect -->
  <rect class="box-connect" x="430" y="210" width="110" height="50" rx="8"/>
  <text class="label" x="485" y="235">connect</text>

  <!-- end state after connect -->
  <circle class="end-success" cx="600" cy="235" r="14"/>

  <!-- connectionAttemptFailed -->
  <rect class="box-retry" x="145" y="90" width="260" height="50" rx="8"/>
  <text class="label" x="275" y="115">connectionAttemptFailed</text>

  <!-- error, same x column as connect -->
  <rect class="box-error" x="430" y="90" width="110" height="50" rx="8"/>
  <text class="label" x="485" y="115">error</text>

  <!-- end state after error, same x column as end state after connect -->
  <circle class="end-error" cx="600" cy="115" r="14"/>

  <!-- connectionAttemptTimeout -->
  <rect class="box-retry" x="145" y="330" width="260" height="50" rx="8"/>
  <text class="label" x="275" y="355">connectionAttemptTimeout</text>

  <!-- lookup -> connectionAttempt -->
  <path class="edge" d="M130,235 L182,235"/>

  <!-- connectionAttempt -> connect -->
  <path class="edge" d="M365,235 L427,235"/>

  <!-- connect -> end -->
  <path class="edge" d="M540,235 L584,235"/>

  <!-- connectionAttempt -> connectionAttemptFailed (failure occurs) -->
  <path class="edge" d="M330,208 C 330,175 330,175 320,143"/>

  <!-- connectionAttemptFailed -> connectionAttempt (retry next address) -->
  <path class="edge" d="M230,143 C 220,175 220,175 220,208"/>

  <!-- connectionAttemptFailed -> error, straight line -->
  <path class="edge" d="M405,115 L427,115"/>

  <!-- error -> end -->
  <path class="edge" d="M540,115 L584,115"/>

  <!-- connectionAttempt -> connectionAttemptTimeout (timeout occurs) -->
  <path class="edge" d="M330,262 C 330,295 330,295 320,327"/>

  <!-- connectionAttemptTimeout -> connectionAttempt (retry next address) -->
  <path class="edge" d="M230,327 C 220,295 220,295 220,262"/>
</svg>
