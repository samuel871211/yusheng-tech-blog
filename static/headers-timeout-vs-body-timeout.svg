  <ellipse class="ink" cx="930" cy="215" rx="108" ry="82"/>

  <text class="txt" x="113" y="248">client</text>
  <text class="txt" x="865" y="232">Server</text>

  <!-- HTTP Request Fully Sent -->
  <path class="ink" d="M355 312 L870 312 L870 400 L355 400 Z"/>
  <text class="txt" x="370" y="370">HTTP Request Fully Sent</text>

  <!-- main arrow -->
  <line class="ink" x1="330" y1="450" x2="870" y2="465" marker-end="url(#arrow)"/>

  <!-- main arrow -->
  <line class="ink" x1="870" y1="600" x2="330" y2="585" marker-end="url(#arrow)"/>

  <!-- HTTP response text -->
  <text class="txt small" x="365" y="680">HTTP/1.1 200 OK</text>
  <text class="txt small" x="365" y="745">Connection: keep-alive</text>
  <text class="txt small" x="365" y="810">Content-Length: 5</text>
  <text class="txt small" x="365" y="875">\r\n</text>
  <text class="txt small" x="365" y="960">12345</text>

  <!-- brackets -->
  <path class="ink" d="M325 655 L300 655 L300 880 L325 880"/>
  <path class="ink" d="M325 900 L300 900 L300 980 L325 980"/>

  <!-- bracket labels -->
  <text class="txt tiny" x="150" y="770">headers</text>
  <text class="txt tiny" x="150" y="820">Timeout</text>

  <text class="txt tiny" x="150" y="920">body</text>
  <text class="txt tiny" x="150" y="970">Timeout</text>
