<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <!-- title -->
  <text x="500" y="22" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Microsoft JhengHei', sans-serif" font-size="15" font-weight="700" fill="#1e293b">正常情境的時間軸（無 error、使用者沒有主動呼叫 destroy()）</text>

  <!-- baseline segments -->
  <line x1="65"  y1="105" x2="291" y2="105" stroke="#94a3b8" stroke-width="4"/>
  <line x1="291" y1="105" x2="517" y2="105" stroke="#6366f1" stroke-width="4"/>
  <line x1="517" y1="105" x2="744" y2="105" stroke="#22c55e" stroke-width="4"/>
  <line x1="744" y1="105" x2="970" y2="105" stroke="#f59e0b" stroke-width="4"/>

  <!-- milestone dots -->
  <circle cx="291" cy="105" r="7" fill="#6366f1"/>
  <circle cx="517" cy="105" r="7" fill="#22c55e"/>
  <circle cx="744" cy="105" r="7" fill="#f59e0b"/>

  <!-- event labels (above) -->
  <text x="291" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">end()</text>
  <text x="517" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">on('finish')</text>
  <text x="744" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">on('close')</text>

  <!-- dashed connectors -->
  <line x1="291" y1="90" x2="291" y2="105" stroke="#6366f1" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="517" y1="90" x2="517" y2="105" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="744" y1="90" x2="744" y2="105" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- state labels (below segments) -->
  <text x="178" y="135" text-anchor="middle" font-size="13" fill="#475569">writable</text>
  <text x="404" y="135" text-anchor="middle" font-size="13" fill="#475569">writableEnded</text>
  <text x="631" y="135" text-anchor="middle" font-size="13" fill="#475569">writableFinished</text>
  <text x="857" y="135" text-anchor="middle" font-size="13" fill="#475569">closed</text>

  <!-- state = true annotations -->
  <text x="178" y="152" text-anchor="middle" font-size="11" fill="#94a3b8">= true</text>
  <text x="404" y="152" text-anchor="middle" font-size="11" fill="#94a3b8">= true</text>
  <text x="631" y="152" text-anchor="middle" font-size="11" fill="#94a3b8">= true</text>
  <text x="857" y="152" text-anchor="middle" font-size="11" fill="#94a3b8">= true</text>
</svg>
