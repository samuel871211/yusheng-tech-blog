<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="800" viewBox="0 0 1300 800">
  <defs>
    <style>
      .ink { fill: none; stroke: #3f2b7a; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .txt { fill: #3f2b7a; font-family: "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive; font-size: 26px; }
      .label { font-size: 28px; }
      .badge-num { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 20px; font-weight: 700; }
      .caption { fill: #3f2b7a; font-family: "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive; font-size: 22px; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,14 L14,7 z" fill="#3f2b7a"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d8d8d8" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- graph paper background -->
  <rect x="0" y="0" width="1300" height="800" fill="#fafafa"/>
  <rect x="0" y="0" width="1300" height="800" fill="url(#grid)" opacity="0.9"/>

  <!-- left labels: top group -->
  <text class="txt label" x="40" y="80">http.Server</text>
  <text class="txt label" x="40" y="120">IncomingMessage</text>
  <text class="txt label" x="40" y="160">ServerResponse</text>
  <text class="txt label" x="40" y="200">ClientRequest</text>

  <!-- left label: bottom -->
  <text class="txt label" x="40" y="658">net.Socket</text>

  <!-- vertical divider -->
  <line class="ink" x1="300" y1="40" x2="300" y2="760"/>

  <!-- box 1: top-level setTimeout(msecs, callback) -->
  <rect class="ink" x="340" y="80" width="400" height="100"/>
  <text class="txt" x="540" y="140" text-anchor="middle">setTimeout(msecs, callback)</text>

  <!-- box 5: top-level on("timeout", callback) -->
  <rect class="ink" x="900" y="80" width="340" height="100"/>
  <text class="txt" x="1070" y="140" text-anchor="middle">on("timeout", callback)</text>

  <!-- box 4: emit("timeout") -->
  <rect class="ink" x="900" y="340" width="340" height="100"/>
  <text class="txt" x="1070" y="400" text-anchor="middle">emit("timeout")</text>

  <!-- box 2: net.Socket.setTimeout(msecs) -->
  <rect class="ink" x="340" y="600" width="400" height="100"/>
  <text class="txt" x="540" y="660" text-anchor="middle">setTimeout(msecs)</text>

  <!-- box 3: net.Socket on("timeout") -->
  <rect class="ink" x="900" y="600" width="340" height="100"/>
  <text class="txt" x="1070" y="660" text-anchor="middle">on("timeout")</text>

  <!-- arrow 1 -> 2 : down, column 1 (x = 540) -->
  <line class="ink" x1="540" y1="184" x2="540" y2="580" marker-end="url(#arrow)"/>

  <!-- arrow 2 -> 3 : right, row bottom (y = 650) -->
  <line class="ink" x1="744" y1="650" x2="882" y2="650" marker-end="url(#arrow)"/>

  <!-- arrow 3 -> 4 : up, column 2 (x = 1070) -->
  <line class="ink" x1="1070" y1="596" x2="1070" y2="460" marker-end="url(#arrow)"/>

  <!-- arrow 4 -> 5 : up, column 2 (x = 1070) -->
  <line class="ink" x1="1070" y1="336" x2="1070" y2="198" marker-end="url(#arrow)"/>

  <!-- step badges: 1 5 / 4 / 2 3 -->
  <circle cx="340" cy="80" r="18" fill="#3f2b7a"/>
  <text class="badge-num" x="340" y="87" text-anchor="middle">1</text>

  <circle cx="900" cy="80" r="18" fill="#3f2b7a"/>
  <text class="badge-num" x="900" y="87" text-anchor="middle">5</text>

  <circle cx="900" cy="340" r="18" fill="#3f2b7a"/>
  <text class="badge-num" x="900" y="347" text-anchor="middle">4</text>

  <circle cx="340" cy="600" r="18" fill="#3f2b7a"/>
  <text class="badge-num" x="340" y="607" text-anchor="middle">2</text>

  <circle cx="900" cy="600" r="18" fill="#3f2b7a"/>
  <text class="badge-num" x="900" y="607" text-anchor="middle">3</text>
</svg>
