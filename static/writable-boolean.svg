<svg width="880" height="150" viewBox="0 0 880 150" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <!-- baseline segments -->
  <line x1="40"  y1="75" x2="245" y2="75" stroke="#94a3b8" stroke-width="4"/>
  <line x1="245" y1="75" x2="450" y2="75" stroke="#6366f1" stroke-width="4"/>
  <line x1="450" y1="75" x2="655" y2="75" stroke="#22c55e" stroke-width="4"/>
  <line x1="655" y1="75" x2="860" y2="75" stroke="#f59e0b" stroke-width="4"/>

  <!-- milestone dots -->
  <circle cx="245" cy="75" r="7" fill="#6366f1"/>
  <circle cx="450" cy="75" r="7" fill="#22c55e"/>
  <circle cx="655" cy="75" r="7" fill="#f59e0b"/>

  <!-- event labels (above) -->
  <text x="245" y="50" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">end()</text>
  <text x="450" y="50" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">on('finish')</text>
  <text x="655" y="50" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">on('close')</text>

  <!-- dashed connectors -->
  <line x1="245" y1="60" x2="245" y2="75" stroke="#6366f1" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="450" y1="60" x2="450" y2="75" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="655" y1="60" x2="655" y2="75" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- state labels (below segments) -->
  <text x="142" y="105" text-anchor="middle" font-size="13" fill="#475569">writable</text>
  <text x="347" y="105" text-anchor="middle" font-size="13" fill="#475569">writableEnded</text>
  <text x="552" y="105" text-anchor="middle" font-size="13" fill="#475569">writableFinished</text>
  <text x="757" y="105" text-anchor="middle" font-size="13" fill="#475569">closed</text>

  <!-- state = true annotations -->
  <text x="142" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">= true</text>
  <text x="347" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">= true</text>
  <text x="552" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">= true</text>
  <text x="757" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">= true</text>
</svg>